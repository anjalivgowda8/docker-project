<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Docker Compose App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #38bdf8;
    }

    p {
      color: #94a3b8;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      background-color: #38bdf8;
      color: #000;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      background-color: #0ea5e9;
    }

    #output {
      margin-top: 25px;
      font-size: 18px;
      color: #22c55e;
      word-wrap: break-word;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Docker Compose Flask App</h1>
    <p>Frontend connected to Flask + PostgreSQL backend</p>

    <button onclick="getHome()">Check App</button>
    <button onclick="getDB()">Check Database</button>

    <div id="output">Click a button to see results...</div>

    <footer>
      Built with Docker, Flask & PostgreSQL
    </footer>
  </div>

  <script>
    // 🔴 CHANGE THIS AFTER DEPLOYMENT
    const API_BASE = "http://localhost:5000";

    async function getHome() {
      try {
        const res = await fetch(API_BASE + "/");
        const data = await res.text();
        document.getElementById("output").innerText = data;
      } catch (error) {
        document.getElementById("output").innerText = "Error connecting to backend";
      }
    }

    async function getDB() {
      try {
        const res = await fetch(API_BASE + "/db");
        const data = await res.text();
        document.getElementById("output").innerText = data;
      } catch (error) {
        document.getElementById("output").innerText = "Database connection failed";
      }
    }
  </script>

</body>
</html>
